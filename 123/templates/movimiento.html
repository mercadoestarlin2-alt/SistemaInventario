<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Movimientos de Stock</title>
</head>
<body class="container mt-5" style="max-width: 500px;">
    <div class="card p-4 shadow">
        <h3 class="mb-3">Registrar Entrada / Salida</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Seleccionar Producto</label>
                <select name="producto_id" class="form-select" required>
                    {% for p in productos %}
                        <option value="{{ p[0] }}">{{ p[1] }} (ID: {{ p[0] }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo de Movimiento</label>
                <select name="tipo" class="form-select">
                    <option value="ENTRADA">ENTRADA (Aumentar Stock)</option>
                    <option value="SALIDA">SALIDA (Disminuir Stock)</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" name="cantidad" class="form-control" min="1" required>
            </div>
            <div class="d-flex justify-content-between">
                <a href="/dashboard" class="btn btn-secondary">Volver</a>
                <button type="submit" class="btn btn-primary">Guardar Movimiento</button>
            </div>
        </form>
    </div>
</body>
</html>
